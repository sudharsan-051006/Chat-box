{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat | {{ room_name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
    
    <style>
        :root {
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.2);
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --me-bubble: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        }

        * { box-sizing: border-box; }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.1) 0px, transparent 50%);
            color: #f8fafc;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* --- LIGHT MODE OVERRIDES --- */
        body.light-mode {
            --bg-dark: #f8fafc;
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            color: #0f172a;
            background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.05) 0px, transparent 50%);
        }

        .app {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 992px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100vh;
                z-index: 1000;
            }
            .sidebar.show { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        }

        .sidebar h6 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 16px;
        }

        .room-badge {
            background: rgba(14, 165, 233, 0.1);
            color: var(--accent);
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-btn {
            text-align: left;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
            border: 1px solid transparent;
            background: transparent;
            color: inherit;
            margin-bottom: 8px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border);
        }

        /* --- CHAT AREA --- */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .chat-header {
            padding: 16px 24px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .chat-container {
            max-width: 900px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- MESSAGES --- */
        .message {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            max-width: 70%;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message.me {
            align-self: flex-end;
            background: var(--me-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-user {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.8;
            display: block;
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }

        .system {
            align-self: center;
            font-size: 12px;
            background: rgba(255,255,255,0.05);
            padding: 6px 16px;
            border-radius: 20px;
            color: #94a3b8;
        }

        /* --- INPUT BAR --- */
        .chat-input {
            padding: 24px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
        }

        .input-wrapper {
            max-width: 900px;
            margin: auto;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: inherit;
            padding: 10px;
            max-height: 150px;
            font-size: 15px;
            outline: none !important;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .send-btn:active { transform: scale(0.95); }

        /* Online Users List */
        .list-group-item {
            background: transparent;
            border: none;
            color: inherit;
            padding: 8px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
        }
    </style>
</head>

<body class="dark-mode">

<div class="app">
    <aside class="sidebar">
        <div class="room-badge">
            <span><i class="fa-solid fa-hashtag me-2"></i>{{ room_name }}</span>
            {% if room.is_locked %}<i class="fa-solid fa-lock"></i>{% endif %}
        </div>

        <h6>Management</h6>
        {% if request.user == room.created_by %}
        <button id="lock-room-btn" class="nav-btn w-100" data-room="{{ room.name }}">
            <i class="fa-solid {% if room.is_locked %}fa-unlock{% else %}fa-lock{% endif %}"></i>
            {% if room.is_locked %}Unlock Room{% else %}Lock Room{% endif %}
        </button>
        {% endif %}

        <button id="clear-cache-btn" class="nav-btn w-100 text-warning">
            <i class="fa-solid fa-broom"></i> Clear Local History
        </button>

        <button id="toggle-theme-btn" class="nav-btn w-100">
            <i class="fa-solid fa-circle-half-stroke"></i> Appearance
        </button>

        <hr style="border-color: var(--border)">

        <h6 id="online-users-title">Online Users (0)</h6>
        <div id="online-users" class="mb-3"></div>

        <div class="mt-auto">
            <button id="leave-room-btn" class="nav-btn w-100 text-danger">
                <i class="fa-solid fa-door-open"></i> Leave Room
            </button>
            <a href="{% url 'logout' %}" class="nav-btn w-100">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <section class="chat">
        <header class="chat-header">
            <button id="menu-btn" class="btn btn-sm btn-outline-secondary d-lg-none">☰</button>
            <span>{{ room_name }}</span>
            <div class="d-flex gap-2">
                <div id="connection-status" class="status-dot" style="background: #eab308;" title="Connecting..."></div>
            </div>
        </header>

        <div class="chat-body">
            <div id="chat-messages" class="chat-container"></div>
        </div>

        <div class="chat-input">
            <form id="chat-form" class="input-wrapper">
                {% csrf_token %}
                <textarea id="chat-message-input" rows="1" placeholder="Type a message..."></textarea>
                <button type="submit" class="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </section>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const roomName = "{{ room_name }}";
    const configuredWebsocketHost = "{{ websocket_host|default:'' }}".trim();

    function buildWebSocketUrl() {
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const host = configuredWebsocketHost || window.location.host;
        return `${protocol}://${host.replace(/\/$/, "")}/ws/chat/${encodeURIComponent(roomName)}/`;
    }

    const ws = new WebSocket(buildWebSocketUrl());
    const chatMessages = document.getElementById("chat-messages");
    const input = document.getElementById("chat-message-input");
    const form = document.getElementById("chat-form");
    const statusDot = document.getElementById("connection-status");
    const currentUser = "{{ request.user.username }}";

    ws.onopen = () => statusDot.style.background = "#22c55e";
    ws.onclose = () => statusDot.style.background = "#ef4444";

    /* --- CACHE & RENDER --- */
    function renderMessage(data) {
        if (!data || !data.user || !data.message) return;

        const div = document.createElement("div");
        if (data.user === "System") {
            div.className = "system";
            div.textContent = data.message;
        } else {
            const isMe = data.user.trim().toLowerCase() === currentUser.trim().toLowerCase();
            div.className = `message ${isMe ? 'me' : 'other'}`;
            
            let content = "";
            if (!isMe) content += `<span class="msg-user">${data.user}</span>`;
            content += `<div>${data.message}</div><div class="msg-time">${data.time}</div>`;
            div.innerHTML = content;
        }

        chatMessages.appendChild(div);
        document.querySelector(".chat-body").scrollTop = document.querySelector(".chat-body").scrollHeight;
    }

    ws.onmessage = function (e) {
        const raw = JSON.parse(e.data);
        const now = new Date();
        const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        if (raw.type === "system") {
            renderMessage({ user: "System", message: raw.text, time });
        } else if (raw.type === "user_list") {
            updateUserList(raw.users);
        } else if (raw.user && raw.message) {
            const data = { user: raw.user, message: raw.message, time };
            saveToLocal(data);
            renderMessage(data);
        }
    };

    function updateUserList(users) {
        const container = document.getElementById("online-users");
        document.getElementById("online-users-title").textContent = `Online Users (${users.length})`;
        container.innerHTML = users.map(u => `
            <div class="list-group-item">
                <div class="status-dot"></div>
                <span>${u} ${u === currentUser ? '(You)' : ''}</span>
            </div>
        `).join('');
    }

    function saveToLocal(data) {
        const key = "chat_" + roomName;
        const msgs = JSON.parse(localStorage.getItem(key) || "[]");
        msgs.push(data);
        localStorage.setItem(key, JSON.stringify(msgs.slice(-100)));
    }

    // Load cached
    const cached = JSON.parse(localStorage.getItem("chat_" + roomName) || "[]");
    cached.forEach(renderMessage);

    /* --- ACTIONS --- */
    form.onsubmit = e => {
        e.preventDefault();
        if (input.value.trim() && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ message: input.value }));
            input.value = "";
            input.style.height = "auto";
        }
    };

    // Auto-resize textarea
    input.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = (this.scrollHeight) + "px";
    });

    document.getElementById("clear-cache-btn").onclick = () => {
        localStorage.removeItem("chat_" + roomName);
        chatMessages.innerHTML = "";
        renderMessage({user: "System", message: "History cleared locally", time: ""});
    };

    document.getElementById("leave-room-btn").onclick = () => {
        ws.close();
        window.location.href = "/";
    };

    // Theme Toggle
    const themeBtn = document.getElementById("toggle-theme-btn");
    themeBtn.onclick = () => {
        document.body.classList.toggle("dark-mode");
        document.body.classList.toggle("light-mode");
        localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark-mode" : "light-mode");
    };
    if(localStorage.getItem("theme") === "light-mode") themeBtn.click();

    // Mobile Menu
    const menuBtn = document.getElementById("menu-btn");
    const sidebar = document.querySelector(".sidebar");
    menuBtn.onclick = (e) => { e.stopPropagation(); sidebar.classList.toggle("show"); };
    document.addEventListener("click", () => sidebar.classList.remove("show"));
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
