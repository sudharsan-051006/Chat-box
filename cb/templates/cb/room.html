{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat | {{ room_name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
    
    <style>
        :root {
            --accent: #0ea5e9;
            --bg-dark: #0f172a;
            --sidebar-dark: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --me-bubble: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        }

        body.light-mode {
            --bg-dark: #f1f5f9;
            --sidebar-dark: #ffffff;
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.1);
            --text-main: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .app { display: flex; height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--sidebar-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 992px) {
            .sidebar { position: fixed; left: -280px; top: 0; height: 100vh; }
            .sidebar.show { transform: translateX(280px); box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        }

        .sidebar h6 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 12px;
        }

        .room-title {
            font-weight: 700;
            color: var(--accent);
            padding: 8px 12px;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* --- BUTTONS --- */
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-main);
            text-decoration: none;
            margin-bottom: 6px;
            transition: all 0.2s;
            cursor: pointer;
            text-align: left;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
        .nav-btn.warning { color: #f59e0b; }
        .nav-btn.danger { color: #ef4444; }

        /* --- USER LIST --- */
        .user-list-container { flex: 1; overflow-y: auto; margin-top: 10px; }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 5px;
            font-size: 13px;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }

        /* --- CHAT AREA --- */
        .chat { flex: 1; display: flex; flex-direction: column; position: relative; }

        .chat-header {
            padding: 16px 24px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
        }

        .chat-body { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .chat-container { max-width: 850px; margin: auto; display: flex; flex-direction: column; gap: 15px; }

        /* --- MESSAGES --- */
        .message { padding: 12px 16px; border-radius: 18px; font-size: 15px; max-width: 75%; line-height: 1.5; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .message.me { align-self: flex-end; background: var(--me-bubble); color: white; border-bottom-right-radius: 4px; }
        .message.other { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        .msg-user { font-size: 11px; font-weight: 800; opacity: 0.8; margin-bottom: 4px; display: block; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 6px; text-align: right; }
        .system { align-self: center; font-size: 12px; background: rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 20px; opacity: 0.7; }

        /* --- INPUT --- */
        .chat-input { padding: 20px 24px 30px; background: linear-gradient(to top, var(--bg-dark), transparent); }
        .input-box {
            max-width: 850px;
            margin: auto;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }

        textarea { flex: 1; background: transparent; border: none; color: inherit; resize: none; outline: none; padding: 8px; font-size: 15px; }
        .send-btn { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 12px; transition: transform 0.2s; }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>

<body class="dark-mode">

<div class="app">
    <aside class="sidebar">
        <h6>Current Room</h6>
        <div class="room-title">{{ room_name }}</div>

        {% if request.user == room.created_by %}
        <button id="lock-room-btn" class="nav-btn warning" data-room="{{ room.name }}">
            <i class="fa-solid {% if room.is_locked %}fa-lock-open{% else %}fa-lock{% endif %}"></i>
            {% if room.is_locked %} Unlock Room {% else %} Lock Room {% endif %}
        </button>
        {% endif %}

        <a href="/password_change/" class="nav-btn">
            <i class="fa-solid fa-key"></i> Change Password
        </a>

        <button id="clear-cache-btn" class="nav-btn">
            <i class="fa-solid fa-trash-can"></i> Clear Chat
        </button>

        <button id="toggle-theme-btn" class="nav-btn">
            <i class="fa-solid fa-circle-half-stroke"></i> Change Mode
        </button>

        <hr style="border-color: var(--border)">

        <button id="leave-room-btn" class="nav-btn danger">
            <i class="fa-solid fa-person-walking-arrow-right"></i> Leave Room
        </button>

        <a href="{% url 'logout' %}" class="nav-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>

        <hr style="border-color: var(--border)">

        <h6 id="online-users-title">Online Users (0)</h6>
        <div class="d-flex gap-1 mb-2">
            <button id="enable-all" class="btn btn-sm btn-success flex-grow-1" style="font-size: 10px;">Enable All</button>
            <button id="disable-all" class="btn btn-sm btn-danger flex-grow-1" style="font-size: 10px;">Disable All</button>
        </div>
        
        <div class="user-list-container" id="online-users"></div>
    </aside>

    <main class="chat">
        <header class="chat-header">
            <button id="menu-btn" class="btn btn-sm btn-outline-secondary d-lg-none">
                <i class="fa-solid fa-bars"></i>
            </button>
            <span>{{ room_name }} {% if room.is_locked %} 🔒 {% endif %}</span>
            <div id="ws-status" class="status-dot" style="background: #eab308; margin-left: auto;" title="Connecting..."></div>
        </header>

        <div class="chat-body">
            <div id="chat-messages" class="chat-container"></div>
        </div>

        <div class="chat-input">
            <form id="chat-form" class="input-box">
                {% csrf_token %}
                <textarea id="chat-message-input" rows="1" placeholder="Type a message..."></textarea>
                <button type="submit" class="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const roomName = "{{ room_name }}";
    const currentUser = "{{ request.user.username }}";
    const chatMessages = document.getElementById("chat-messages");
    const input = document.getElementById("chat-message-input");
    const wsStatus = document.getElementById("ws-status");

    let visibleUsers = new Set();
    let currentOnlineUsers = [];

    // --- WebSocket Setup ---
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat/${encodeURIComponent(roomName)}/`);

    ws.onopen = () => { wsStatus.style.background = "#22c55e"; wsStatus.title = "Connected"; };
    ws.onclose = () => { wsStatus.style.background = "#ef4444"; wsStatus.title = "Disconnected"; };

    /* ================= RENDER & CACHE ================= */
    function renderMessage(data) {
        if (!data || !data.user || !data.message) return;
        if (data.user !== "System" && visibleUsers.size > 0 && !visibleUsers.has(data.user)) return;

        const div = document.createElement("div");
        if (data.user === "System") {
            div.className = "system";
            div.textContent = data.message;
        } else {
            const isMe = data.user.trim().toLowerCase() === currentUser.trim().toLowerCase();
            div.className = `message ${isMe ? 'me' : 'other'}`;
            div.innerHTML = `
                ${!isMe ? `<span class="msg-user">${data.user}</span>` : ''}
                <div>${data.message}</div>
                <div class="msg-time">${data.time}</div>
            `;
        }
        chatMessages.appendChild(div);
        document.querySelector(".chat-body").scrollTop = document.querySelector(".chat-body").scrollHeight;
    }

    function cacheMessage(data) {
        const key = "chat_" + roomName;
        const msgs = JSON.parse(localStorage.getItem(key) || "[]");
        msgs.push(data);
        localStorage.setItem(key, JSON.stringify(msgs.slice(-200)));
    }

    function loadCachedMessages() {
        chatMessages.innerHTML = "";
        const cached = JSON.parse(localStorage.getItem("chat_" + roomName) || "[]");
        cached.forEach(renderMessage);
    }

    /* ================= WEBSOCKET HANDLER ================= */
    ws.onmessage = (e) => {
        const raw = JSON.parse(e.data);
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

        if (raw.type === "system") {
            const data = { user: "System", message: raw.text, time };
            cacheMessage(data); renderMessage(data);
        } else if (raw.type === "user_list") {
            currentOnlineUsers = raw.users;
            updateUserListUI(raw.users);
        } else if (raw.user && raw.message) {
            const data = { user: raw.user, message: raw.message, time };
            cacheMessage(data); renderMessage(data);
        }
    };

    function updateUserListUI(users) {
        const ul = document.getElementById("online-users");
        const title = document.getElementById("online-users-title");
        title.textContent = `Online Users (${users.length})`;
        ul.innerHTML = users.map(u => {
            const enabled = visibleUsers.size === 0 || visibleUsers.has(u);
            return `
                <div class="user-item">
                    <span><div class="status-dot d-inline-block me-2"></div>${u}</span>
                    <button class="btn btn-xs ${enabled ? 'btn-outline-danger' : 'btn-outline-success'}" 
                            style="font-size: 9px; padding: 2px 5px;" onclick="toggleUser('${u}')">
                        ${enabled ? 'Disable' : 'Enable'}
                    </button>
                </div>
            `;
        }).join('');
    }

    window.toggleUser = (u) => {
        if (visibleUsers.size === 0) currentOnlineUsers.forEach(x => visibleUsers.add(x));
        visibleUsers.has(u) ? visibleUsers.delete(u) : visibleUsers.add(u);
        loadCachedMessages();
    };

    /* ================= INTERACTION HANDLERS ================= */
    document.getElementById("chat-form").onsubmit = e => {
        e.preventDefault();
        if (input.value.trim() && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ message: input.value }));
            input.value = "";
        }
    };

    document.getElementById("enable-all").onclick = () => { visibleUsers.clear(); loadCachedMessages(); updateUserListUI(currentOnlineUsers); };
    document.getElementById("disable-all").onclick = () => { visibleUsers.clear(); visibleUsers.add(currentUser); loadCachedMessages(); updateUserListUI(currentOnlineUsers); };
    
    document.getElementById("clear-cache-btn").onclick = () => {
        localStorage.removeItem("chat_" + roomName);
        chatMessages.innerHTML = "";
        renderMessage({ user: "System", message: "🧹 Chat history cleared (local)", time: "" });
    };

    document.getElementById("leave-room-btn").onclick = () => { ws.close(); window.location.href = "/"; };

    document.getElementById("lock-room-btn")?.addEventListener("click", function() {
        fetch(`/room/${roomName}/toggle-lock/`, {
            method: "POST",
            headers: { "X-CSRFToken": "{{ csrf_token }}", "Content-Type": "application/json" },
            body: JSON.stringify({ allowed_users: currentOnlineUsers })
        }).then(() => location.reload());
    });

    // --- Theme Management ---
    const themeBtn = document.getElementById("toggle-theme-btn");
    const applyTheme = (theme) => {
        document.body.className = theme;
        localStorage.setItem("theme", theme);
    };
    themeBtn.onclick = () => applyTheme(document.body.classList.contains("dark-mode") ? "light-mode" : "dark-mode");
    applyTheme(localStorage.getItem("theme") || "dark-mode");

    // --- Mobile Sidebar ---
    const sidebar = document.querySelector(".sidebar");
    document.getElementById("menu-btn").onclick = (e) => { e.stopPropagation(); sidebar.classList.toggle("show"); };
    document.addEventListener("click", () => sidebar.classList.remove("show"));
    sidebar.onclick = (e) => e.stopPropagation();

    loadCachedMessages();
});
</script>
</body>
</html>
